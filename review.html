<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChessOrion – Review</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--dark:#0a0a0f;--panel:#14141e;--panel2:#1a1a28;--border:#2a2a3a;--text:#e8e8f0;--muted:#888899;--light:#f0d9b5;--dark-sq:#b58863;--success:#55c088;--error:#e05555}
body{font-family:'Crimson Pro',serif;background:var(--dark);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;-webkit-user-select:none;user-select:none}
.topbar{position:fixed;top:0;left:0;right:0;background:#10101899;backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;gap:10px;z-index:100}
.logo-top{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);font-weight:900;margin-right:auto}
.page{width:100%;max-width:900px;margin-top:64px;padding-bottom:32px}
.page-title{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--gold);text-align:center;margin-bottom:4px}
.page-sub{color:var(--muted);text-align:center;font-style:italic;margin-bottom:20px}
.layout{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.board-side{display:flex;flex-direction:column;gap:10px;align-items:center}
.board-wrap{width:min(440px,calc(100vw - 24px));aspect-ratio:1}
#board{display:grid;grid-template-columns:repeat(8,1fr);width:100%;height:100%;border:2px solid var(--border);border-radius:4px;overflow:hidden;box-shadow:0 12px 40px #00000099}
.sq{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.sq.light{background:var(--light)}.sq.dark-sq{background:var(--dark-sq)}
.sq.lm.light{background:#cdd16f!important}.sq.lm.dark-sq{background:#aab84f!important}
.piece{font-size:clamp(22px,5vw,40px);line-height:1;filter:drop-shadow(0 2px 4px #00000077);pointer-events:none}
.coord{position:absolute;font-size:8px;font-family:'Cinzel',serif;font-weight:700;opacity:.65;pointer-events:none}
.coord.rank{bottom:1px;right:2px}.coord.file{top:1px;left:2px}
.controls{display:flex;gap:8px;width:100%;max-width:440px}
.ctrl-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--text);font-family:'Cinzel',serif;font-size:.8rem;cursor:pointer;transition:.2s}
.ctrl-btn:hover{border-color:var(--gold);color:var(--gold)}
.move-counter{text-align:center;font-family:'Cinzel',serif;font-size:.85rem;color:var(--muted)}
.info-side{width:min(280px,100%);display:flex;flex-direction:column;gap:12px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
.card-title{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold);margin-bottom:10px;letter-spacing:.1em}
.move-list{max-height:300px;overflow-y:auto;font-size:.85rem}
.move-row{display:flex;gap:4px;margin-bottom:2px;align-items:center}
.move-num{color:var(--muted);width:24px;flex-shrink:0;font-size:.75rem}
.move-cell{flex:1;padding:4px 8px;border-radius:5px;cursor:pointer;transition:.15s;font-family:'Cinzel',serif;font-size:.75rem}
.move-cell:hover{background:var(--panel2);color:var(--gold)}
.move-cell.active{background:#c9a84c22;color:var(--gold);border:1px solid var(--gold)}
.result-badge{text-align:center;padding:12px;border-radius:10px;font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:.08em}
.result-badge.win{background:#55c08822;border:1px solid var(--success);color:var(--success)}
.result-badge.loss{background:#e0555522;border:1px solid var(--error);color:var(--error)}
.result-badge.draw{background:#88889922;border:1px solid var(--muted);color:var(--muted)}
.player-mini{display:flex;align-items:center;gap:8px;padding:8px;background:var(--panel2);border-radius:8px;margin-bottom:6px}
.mini-av{width:28px;height:28px;border-radius:50%;background:var(--dark);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;overflow:hidden;flex-shrink:0}
.mini-av img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.mini-name{font-family:'Cinzel',serif;font-size:.75rem;flex:1}
.mini-elo{font-size:.7rem;color:var(--gold)}
.elo-tag{font-size:.7rem;padding:2px 6px;border-radius:4px}
.elo-tag.win{background:#55c08822;color:var(--success)}
.elo-tag.loss{background:#e0555522;color:var(--error)}
.elo-tag.draw{background:#88889922;color:var(--muted)}
.btn{padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--text);font-family:'Cinzel',serif;font-size:.82rem;cursor:pointer;transition:.2s;text-decoration:none;display:inline-block;text-align:center}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.gold{background:linear-gradient(135deg,#8b6914,var(--gold));color:#0a0a0f;border:none}
.no-game{text-align:center;padding:60px 20px}
.no-game .icon{font-size:3rem;margin-bottom:16px}
.no-game h3{font-family:'Cinzel',serif;color:var(--gold);margin-bottom:8px}
.no-game p{color:var(--muted);margin-bottom:20px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" style="color:var(--gold);text-decoration:none;font-size:1.1rem">←</a>
  <div class="logo-top">♔ ChessOrion</div>
  <span style="font-size:.75rem;color:var(--muted)">Game Review</span>
</div>

<div class="page">
  <div class="page-title">♙ Game Review</div>
  <div class="page-sub">Replay and analyze your games</div>
  <div id="content">
    <div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyBDFWnGF4gG7nRrqwGAlxL-EOZiSPXs7kM",authDomain:"chessorion-cb690.firebaseapp.com",projectId:"chessorion-cb690",storageBucket:"chessorion-cb690.firebasestorage.app",messagingSenderId:"936378240439",appId:"1:936378240439:web:7a578803271ea9b7a52c32"};
const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app);
const PIECES={wK:'♔',wQ:'♕',wR:'♖',wB:'♗',wN:'♘',wP:'♙',bK:'♚',bQ:'♛',bR:'♜',bB:'♝',bN:'♞',bP:'♟'};
let cu=null,ud=null,gd=null,positions=[],moveIdx=0,moves=[];

onAuthStateChanged(auth,async u=>{
  if(!u){location.href='login.html';return;}
  cu=u;
  const s=await getDoc(doc(db,'users',u.uid));
  if(s.exists())ud=s.data();
  const gid=sessionStorage.getItem('reviewGameId')||new URLSearchParams(location.search).get('g');
  if(!gid){showNoGame();return;}
  const gs=await getDoc(doc(db,'games',gid));
  if(!gs.exists()){showNoGame();return;}
  gd=gs.data();moves=gd.moves||[];
  buildPositions();
  renderPage();
});

function buildPositions(){
  const START='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
  positions=[START];
  let brd=new Array(64).fill(null);
  let cr='KQkq',ep='-';
  loadFenInto(START,brd);
  for(const mv of moves){
    const nb=[...brd],p=brd[mv.from];if(!p)continue;
    if(p.t==='P'&&mv.to===epIdx(ep)){const d=p.c==='w'?1:-1;nb[mv.to+d*8]=null;}
    if(p.t==='K'){cr=cr.replace(p.c==='w'?/[KQ]/g:/[kq]/g,'');const diff=mv.to-mv.from;if(Math.abs(diff)===2){if(diff===2){nb[63]=null;nb[61]={c:p.c,t:'R'};}else{nb[56]=null;nb[59]={c:p.c,t:'R'};}}}
    if(p.t==='R'){if(mv.from===63)cr=cr.replace('K','');if(mv.from===56)cr=cr.replace('Q','');if(mv.from===7)cr=cr.replace('k','');if(mv.from===0)cr=cr.replace('q','');}
    let nep='-';if(p.t==='P'&&Math.abs(mv.to-mv.from)===16)nep=algOf(mv.from+(mv.to>mv.from?8:-8));
    nb[mv.to]=mv.promo?{c:p.c,t:mv.promo}:p;nb[from=mv.from,nb[from]=null,mv.from]=null;
    for(let i=0;i<64;i++)brd[i]=nb[i];
    ep=nep;cr=cr||'-';
    const turn=p.c==='w'?'black':'white';
    positions.push(fenFrom(brd,turn,cr,ep));
  }
}

function loadFenInto(fen,brd){
  const rows=fen.split(' ')[0].split('/');let idx=0;
  for(let i=0;i<64;i++)brd[i]=null;
  for(const row of rows)for(const ch of row){if('12345678'.includes(ch)){idx+=+ch;}else{const c=ch===ch.toUpperCase()?'w':'b';brd[idx++]={c,t:ch.toUpperCase()};}}
}
function fenFrom(brd,turn,cr,ep){
  let rows=[];for(let r=0;r<8;r++){let row='',e=0;for(let c=0;c<8;c++){const p=brd[r*8+c];if(!p){e++;}else{if(e){row+=e;e=0;}row+=p.c==='w'?p.t:p.t.toLowerCase();}}if(e)row+=e;rows.push(row);}
  return rows.join('/')+` ${turn==='white'?'w':'b'} ${cr||'-'} ${ep||'-'} 0 1`;
}
function epIdx(e){if(e==='-')return -1;return(8-parseInt(e[1]))*8+(e.charCodeAt(0)-97);}
function algOf(i){return'abcdefgh'[i%8]+(8-Math.floor(i/8));}
function mvTxt(mv){const n={P:'',R:'R',N:'N',B:'B',Q:'Q',K:'K'};return(n[mv.p]||'')+algOf(mv.from)+algOf(mv.to)+(mv.promo||'');}

function renderPage(){
  if(!gd)return;
  const isWhite=gd.white===cu.uid;
  let res='draw';
  if(gd.status==='checkmate'||gd.status==='timeout'||gd.status==='resignation'){
    res=gd.winner===(isWhite?'white':'black')?'win':'loss';
  }
  let moveListHtml='';
  for(let i=0;i<moves.length;i+=2){
    const wm=moves[i],bm=moves[i+1];
    moveListHtml+=`<div class="move-row">
      <span class="move-num">${Math.floor(i/2)+1}.</span>
      <span class="move-cell" id="mc${i+1}" onclick="goTo(${i+1})">${mvTxt(wm)}</span>
      ${bm?`<span class="move-cell" id="mc${i+2}" onclick="goTo(${i+2})">${mvTxt(bm)}</span>`:'<span style="flex:1"></span>'}
    </div>`;
  }
  document.getElementById('content').innerHTML=`
    <div class="layout">
      <div class="board-side">
        <div class="board-wrap"><div id="board"></div></div>
        <div class="controls">
          <button class="ctrl-btn" onclick="goTo(0)">|◀</button>
          <button class="ctrl-btn" onclick="step(-1)">◀</button>
          <button class="ctrl-btn" onclick="step(1)">▶</button>
          <button class="ctrl-btn" onclick="goTo(${positions.length-1})">▶|</button>
        </div>
        <div class="move-counter" id="moveCounter">Start</div>
      </div>
      <div class="info-side">
        <div class="card">
          <div class="card-title">Result</div>
          <div class="result-badge ${res}">${res==='win'?'You Won 🏆':res==='loss'?'You Lost':'Draw 🤝'}</div>
          <div style="margin-top:12px">
            <div class="player-mini">
              <div class="mini-av">${gd.whiteAvatar?`<img src="${gd.whiteAvatar}" draggable="false">`:'♙'}</div>
              <div><div class="mini-name">${gd.whiteUser||'White'}</div><div class="mini-elo">${gd.whiteElo||500} ELO</div></div>
              <span class="elo-tag ${gd.winner==='white'?'win':gd.winner?'loss':'draw'}">${gd.winner==='white'?'+8':gd.winner?'-8':'±0'}</span>
            </div>
            <div class="player-mini">
              <div class="mini-av">${gd.blackAvatar?`<img src="${gd.blackAvatar}" draggable="false">`:'♟'}</div>
              <div><div class="mini-name">${gd.blackUser||'Black'}</div><div class="mini-elo">${gd.blackElo||500} ELO</div></div>
              <span class="elo-tag ${gd.winner==='black'?'win':gd.winner?'loss':'draw'}">${gd.winner==='black'?'+8':gd.winner?'-8':'±0'}</span>
            </div>
          </div>
          <div style="margin-top:8px;font-size:.78rem;color:var(--muted);text-align:center">${(gd.mode||'').toUpperCase()} · ${gd.time||''} min · ${gd.status||''}</div>
        </div>
        <div class="card">
          <div class="card-title">Moves (${moves.length})</div>
          <div class="move-list">${moveListHtml||'<div style="color:var(--muted);font-style:italic">No moves recorded</div>'}</div>
        </div>
        <a class="btn gold" href="index.html">Back to Home</a>
      </div>
    </div>`;
  goTo(0);
}

function renderBoard(idx){
  const fen=positions[idx]||positions[0];
  const brd=new Array(64).fill(null);
  loadFenInto(fen,brd);
  const prevMv=moves[idx-1];
  const bd=document.getElementById('board');if(!bd)return;
  bd.innerHTML='';
  for(let d=0;d<64;d++){
    const r=Math.floor(d/8),c=d%8;
    const sq=document.createElement('div');sq.className='sq '+((r+c)%2===0?'light':'dark-sq');
    if(c===0){const x=document.createElement('span');x.className='coord rank';x.textContent=8-r;sq.appendChild(x);}
    if(r===7){const x=document.createElement('span');x.className='coord file';x.textContent='abcdefgh'[c];sq.appendChild(x);}
    if(prevMv&&(prevMv.from===d||prevMv.to===d))sq.classList.add('lm');
    if(brd[d]){const sp=document.createElement('span');sp.className='piece';sp.textContent=PIECES[brd[d].c+brd[d].t];sq.appendChild(sp);}
    bd.appendChild(sq);
  }
}

window.goTo=function(idx){
  moveIdx=Math.max(0,Math.min(idx,positions.length-1));
  renderBoard(moveIdx);
  document.querySelectorAll('.move-cell').forEach(el=>el.classList.remove('active'));
  if(moveIdx>0){const el=document.getElementById('mc'+moveIdx);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}}
  const c=document.getElementById('moveCounter');
  if(c)c.textContent=moveIdx===0?'Start position':`Move ${moveIdx} / ${positions.length-1}`;
};
window.step=function(d){window.goTo(moveIdx+d);};

function showNoGame(){
  document.getElementById('content').innerHTML=`<div class="no-game"><div class="icon">♟️</div><h3>No game found</h3><p>This game doesn't exist or access was denied.</p><a class="btn gold" href="index.html">Back to Home</a></div>`;
}
</script>
<script>
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
  if(e.key==='F12'||(e.ctrlKey&&['u','s','i'].includes(e.key)))e.preventDefault();
  if(e.key==='ArrowLeft')window.step?.(-1);
  if(e.key==='ArrowRight')window.step?.(1);
});
</script>
</body>
</html>
