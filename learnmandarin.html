<style>
  :root {
    --red: #e63946;
    --gold: #f4a261;
    --dark: #1a1a2e;
    --mid: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --green: #06d6a0;
    --yellow: #ffd166;
    --white: #f8f9fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0d0d1a 100%);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    position: relative;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    background: linear-gradient(135deg, #f4a261, #e63946, #e94560);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
    text-shadow: none;
  }
  header p { color: #aaa; font-size: 0.95rem; margin-top: 0.3rem; }
  .hanzi-deco { font-size: 2rem; opacity: 0.15; position: absolute; top: 1rem; }
  .hanzi-deco.left { left: 1rem; } .hanzi-deco.right { right: 1rem; }

  /* PROGRESS */
  #progress-bar-wrap {
    max-width: 600px; margin: 0 auto 1rem;
    background: #111; border-radius: 20px; height: 12px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--gold), var(--accent));
    border-radius: 20px; transition: width 0.5s ease;
  }
  #progress-text { text-align: center; color: #aaa; font-size: 0.85rem; margin-bottom: 1rem; }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* WELCOME SCREEN */
  #welcome {
    text-align: center; padding: 2rem 1rem;
  }
  #welcome .big-hanzi {
    font-size: 6rem; margin: 1rem 0;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)}
  }
  #welcome h2 { font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--gold); }
  #welcome p { max-width:400px; margin:0.8rem auto; color:#ccc; line-height:1.6; }
  .info-chips { display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center; margin:1rem 0; }
  .chip {
    background: var(--card); border-radius:20px; padding:0.4rem 1rem;
    font-size:0.85rem; border:1px solid #ffffff22;
  }
  .chip span { color: var(--gold); font-weight:800; }

  /* BUTTONS */
  .btn {
    display: inline-block; padding: 0.9rem 2.5rem;
    border-radius: 50px; border: none; cursor: pointer;
    font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    transition: all 0.2s; text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--red), var(--accent));
    color: white; box-shadow: 0 4px 20px #e6394640;
  }
  .btn-primary:hover { transform: scale(1.05); box-shadow: 0 6px 30px #e6394660; }
  .btn-secondary {
    background: transparent; color: var(--gold);
    border: 2px solid var(--gold);
  }
  .btn-secondary:hover { background: var(--gold); color: var(--dark); }

  /* QUIZ SCREEN */
  #quiz-screen { max-width: 650px; margin: 0 auto; padding: 1rem; }
  .q-type-badge {
    display: inline-block; padding: 0.3rem 1rem; border-radius: 20px;
    font-size: 0.8rem; font-weight: 700; margin-bottom: 1rem;
  }
  .badge-vocab { background: #e63946; }
  .badge-dialog { background: #0077b6; }
  .badge-hanzi { background: #7b2d8b; }

  .question-card {
    background: var(--card); border-radius: 20px;
    padding: 1.5rem; margin-bottom: 1rem;
    border: 1px solid #ffffff15;
    box-shadow: 0 8px 32px #00000040;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .q-number { color: #aaa; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .q-text {
    font-size: 1.15rem; font-weight: 700; line-height: 1.5;
    margin-bottom: 0.3rem;
  }
  .q-hanzi { font-family: 'Noto Sans SC', sans-serif; font-size: 2rem; color: var(--gold); margin: 0.5rem 0; }
  .q-pinyin { color: #88aacc; font-style: italic; font-size: 0.95rem; }
